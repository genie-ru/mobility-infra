# エッジ（リバースプロキシ）。パスでサービスを振り分ける。
#   /api/    -> backend  (Nest.js :8080、公開パスは /api のまま)
#   /model/  -> model    (FastAPI :8000)
#   /portal/ -> portal   (Next.js :3000, basePath=/portal)
#   /        -> frontend (Next.js :3000, 管理画面)

upstream backend  { server backend:8080; }
upstream model    { server model:8000; }
upstream frontend { server frontend:3000; }
upstream portal   { server portal:3000; }

server {
    listen 80;
    server_name _;

    # プロキシ共通ヘッダ（Next.js / Nest.js が正しい Host・スキームを認識できるように）
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;   # HMR / WebSocket
    proxy_set_header Connection "upgrade";

    location /api/ {
        proxy_pass http://backend;
    }

    location /model/ {
        proxy_pass http://model;
    }

    # /portal（末尾スラッシュ無し）と /portal/... の両方を portal に渡す。
    # `location /portal/` だけだと /portal が location / (frontend) に落ちてしまう。
    location = /portal {
        proxy_pass http://portal;
    }
    location /portal/ {
        proxy_pass http://portal;
    }

    location / {
        proxy_pass http://frontend;
    }
}
