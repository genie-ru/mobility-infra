# 開発用。ソースを bind マウントしてホットリロード。本番は docker-compose.prod.yml。
name: mobility-infra

x-service: &service
  restart: unless-stopped
  networks: [mobility]

services:
  web:
    <<: *service
    build: { context: .., dockerfile: docker/web/Dockerfile, target: base }
    ports: ["80:80"]
    volumes:
      - ../services/web:/etc/nginx/conf.d:ro
    depends_on:
      frontend: { condition: service_healthy }
      portal: { condition: service_healthy }
      backend: { condition: service_healthy }
      model: { condition: service_healthy }

  frontend:   # Next.js 管理画面（運営者向け）
    <<: *service
    build: { context: .., dockerfile: docker/frontend/Dockerfile, target: dev }
    expose: ["3000"]
    environment:
      BACKEND_URL: http://backend:8080
    volumes:
      # node_modules を bind mount 直下に置く。dev 起動時の `pnpm install`(node-linker=hoisted)
      # がホスト側 services/frontend/node_modules に実体で書くので、エディタが型を解決できる。
      - ../services/frontend:/app
    depends_on: [backend]
    healthcheck:   # pnpm install 完了→next dev Ready で healthy。web はこれを待つ
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then(()=>process.exit(0)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 40
      start_period: 30s

  portal:   # Next.js 利用者ポータル（basePath=/portal）
    <<: *service
    build: { context: .., dockerfile: docker/portal/Dockerfile, target: dev }
    expose: ["3000"]
    environment:
      BACKEND_URL: http://backend:8080
    volumes:
      - ../services/portal:/app
    depends_on: [backend]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/portal').then(()=>process.exit(0)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 40
      start_period: 30s

  backend:   # Nest.js バックエンド（公開パスは /api）
    <<: *service
    build: { context: .., dockerfile: docker/backend/Dockerfile, target: dev }
    expose: ["8080"]
    ports: ["8080:8080"]   # dev のみホスト公開
    environment:
      DATABASE_URL: postgres://mobility:mobility@db:5432/mobility?sslmode=disable
      CACHE_URL: redis://cache:6379
    volumes:
      - ../services/backend:/app
    depends_on:
      db: { condition: service_healthy }
      cache: { condition: service_healthy }
    healthcheck:   # pnpm install→nest start(watch) 完了で healthy
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/api/health').then(()=>process.exit(0)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 40
      start_period: 20s

  model:   # Python/FastAPI（AI 推論）
    <<: *service
    build: { context: .., dockerfile: docker/model/Dockerfile, target: dev }
    expose: ["8000"]
    ports: ["8000:8000"]   # dev のみホスト公開（/model/docs で Swagger UI）
    volumes:
      - ../services/model:/app
    healthcheck:   # pip install 完了→uvicorn 起動で healthy。web はこれを待つ
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/model/health')\" || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 40
      start_period: 20s

  notebook:   # JupyterLab（dev 専用の対話環境。prod compose には無い）
    <<: *service
    build: { context: .., dockerfile: docker/notebook/Dockerfile, target: base }
    expose: ["8888"]
    ports: ["8888:8888"]   # http://localhost:8888 （トークン無し・ローカル専用）
    env_file:              # docker/.env（gitignore 済み）から任意の値を注入。無くても起動可
      - path: .env
        required: false
    volumes:
      - ../services/notebook/notebooks:/work

  db:
    <<: *service
    build: { context: .., dockerfile: docker/db/Dockerfile, target: base }
    ports: ["5432:5432"]   # dev のみホスト公開
    environment:
      POSTGRES_USER: mobility
      POSTGRES_PASSWORD: mobility
      POSTGRES_DB: mobility
    volumes:
      - ../services/db:/docker-entrypoint-initdb.d:ro
      - db_data:/var/lib/postgresql   # PG18+ のマウント先
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mobility"]
      interval: 5s
      timeout: 3s
      retries: 10

  cache:
    <<: *service
    build: { context: .., dockerfile: docker/cache/Dockerfile, target: base }
    ports: ["6379:6379"]   # dev のみホスト公開
    command: ["valkey-server", "/usr/local/etc/valkey/valkey.conf"]
    volumes:
      - ../services/cache:/usr/local/etc/valkey:ro
      - cache_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db_data:
  cache_data:

networks:
  mobility:
