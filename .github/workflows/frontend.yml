name: frontend

on:
  push:
    branches: [main]
    paths:
      ["services/frontend/**", "services/openapi.yaml", ".github/workflows/frontend.yml"]
  pull_request:
    paths:
      ["services/frontend/**", "services/openapi.yaml", ".github/workflows/frontend.yml"]

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/frontend
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Regenerate zod from openapi.yaml
        run: bun run gen:api

      - name: Check generated schema is up to date
        run: git diff --exit-code app/api.gen.ts

      - name: Typecheck (tsc --noEmit)
        run: bun run typecheck

      - name: Lint (eslint, incl. no-unsafe-* / no-explicit-any)
        run: bun run lint

      - name: Test (vitest)
        run: bun run test
