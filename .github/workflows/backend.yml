name: backend

on:
  push:
    branches: [main]
    paths:
      ["services/backend/**", "services/openapi.yaml", ".github/workflows/backend.yml"]
  pull_request:
    paths:
      ["services/backend/**", "services/openapi.yaml", ".github/workflows/backend.yml"]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/backend
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: services/backend/go.mod

      - name: Regenerate types from openapi.yaml
        run: go generate ./...

      - name: Check generated types are up to date
        run: git diff --exit-code api.gen.go

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...
