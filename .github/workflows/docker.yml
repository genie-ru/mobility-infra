name: docker

on:
  push:
    branches: [main]
  pull_request:

jobs:
  hadolint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [web, backend, frontend, portal, model, notebook, db, cache]
    steps:
      - uses: actions/checkout@v5
      - name: Lint docker/${{ matrix.service }}/Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/${{ matrix.service }}/Dockerfile
          config: .hadolint.yaml

  scan:
    runs-on: ubuntu-latest
    needs: hadolint
    strategy:
      fail-fast: false
      matrix:
        service: [web, backend, frontend, portal]
    steps:
      - uses: actions/checkout@v5

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build prod image (${{ matrix.service }})
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/${{ matrix.service }}/Dockerfile
          target: prod
          load: true
          tags: mobility-infra-${{ matrix.service }}:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: mobility-infra-${{ matrix.service }}:scan
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          vuln-type: os,library

  e2e:
    runs-on: ubuntu-latest
    needs: hadolint
    steps:
      - uses: actions/checkout@v5

      - name: Validate compose files
        run: |
          cp docker/.env.prod.example docker/.env.prod
          docker compose -f docker/docker-compose.yml config -q
          docker compose --env-file docker/.env.prod -f docker/docker-compose.prod.yml config -q

      - name: Start prod stack
        run: docker compose --env-file docker/.env.prod -f docker/docker-compose.prod.yml up -d --build

      - name: Verify endpoints
        run: |
          for i in $(seq 1 40); do
            if curl -fsS localhost/api/health >/dev/null 2>&1 && curl -fsS localhost/ >/dev/null 2>&1; then ready=1; break; fi
            sleep 3
          done
          [ -n "$ready" ] || { docker compose --env-file docker/.env.prod -f docker/docker-compose.prod.yml logs; exit 1; }
          curl -fsS localhost/api/health | grep -q '"status":"ok"'            # backend  (web -> backend, /api)
          curl -fsS localhost/ | grep -q '<title>'                            # frontend (web -> frontend)
          curl -fsS localhost/portal | grep -q '<title>'                      # portal   (web -> portal)
          [ "$(curl -s -o /dev/null -w '%{http_code}' localhost/probe.svg)" = 200 ]   # public asset
          # 画像最適化(sharp)がロード済みなら 400(SVGポリシー)。500 は libstdc++/libgcc_s 欠落の回帰
          code=$(curl -s -o /dev/null -w '%{http_code}' 'localhost/_next/image?url=%2Fprobe.svg&w=64&q=75')
          [ "$code" = 400 ] || { echo "image optimizer -> $code (expected 400; 500=sharp load failed)"; exit 1; }

      - name: Teardown
        if: always()
        run: docker compose --env-file docker/.env.prod -f docker/docker-compose.prod.yml down -v
